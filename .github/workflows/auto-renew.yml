name: XServer GAME Auto Renew

on:
  schedule:
    # 每天北京时间22:35运行 (UTC时间: 14:35)
    - cron: '09 16 */2 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  auto-renew:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write
      actions: write
    
    timeout-minutes: 15
    
    steps:
      - name: 🔄 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 👈 拉取完整历史，避免 Push 失败
      
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Xserver-renew-private
          token: ${{ secrets.PAT_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv -f private/main.py main.py
      
      - name: 🐍 设置 Python 环境并启用 pip 缓存
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # 自动缓存 pip 依赖，提速降本
          
      - name: 📦 缓存 Playwright 浏览器
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
  
      - name: 📥 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🎭 安装 Playwright 浏览器
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium
          
      - name: 🎌 安装日文字体支持
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          echo "📝 已安装的日文字体："
          fc-list | grep -i "noto.*cjk" | head -5
  
      # =========================
      # 🌐 代理网络配置模块
      # =========================
      - name: 🛠️ Setup and Run Xray
        env:
          XRAY_CONFIG_ENV: ${{ secrets.XRAY_CONFIG_JSON }}
        run: |
          echo "⬇️ 正在下载 Xray 核心..."
          wget -q -O xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray
          unzip -q xray.zip -d xray
          
          echo "📝 正在写入节点配置..."
          echo "$XRAY_CONFIG_ENV" > xray/config.json
          
          echo "🚀 正在后台启动 Xray..."
          cd xray
          chmod +x xray
          nohup ./xray run -c config.json > xray.log 2>&1 &
          cd ..
          
          echo "⏳ 等待 Xray 核心启动 (5秒)..."
          sleep 5
  
      - name: 🔍 Check Proxy IP
        run: |
          echo "🚀 测试 Xray HTTP 代理连接 (10808 端口):"
          if curl -x http://127.0.0.1:10808 https://api.ipify.org; then
            echo -e "\n✅ 代理连接成功！"
          else
            echo -e "\n❌ 代理未生效，下面是 Xray 启动日志："
            cat xray/xray.log
            exit 1
          fi
  
      # =========================
      # 🚀 核心自动化脚本执行
      # =========================
      - name: 🚀 运行 XServer 完全自动化登录
        env:
          XSERVER_ACCOUNTS: ${{ secrets.XSERVER_ACCOUNTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🚀 启动XServer GAME完全自动化登录流程 (多账户版)..."
          python main.py
          
      - name: 📝 提交README.md到仓库
        if: always()
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          # 明确 Push 的目标分支为当前工作流触发的分支
          git diff --staged --quiet || (git commit -m "📊 自动更新续期状态报告 [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')]" && git push origin HEAD:${{ github.ref_name }})
          
      - name: 📸 上传运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xserver-auto-login-results-${{ github.run_number }}
          path: |
            *.png
          retention-days: 7
          
      - name: 🧹 清理旧的工作流运行记录
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 3600
